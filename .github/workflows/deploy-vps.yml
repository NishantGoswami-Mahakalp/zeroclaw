name: Deploy VPS

on:
    workflow_run:
        workflows: ["Production Release Build"]
        types: [completed]
    workflow_dispatch:
        inputs:
            artifact_run_id:
                description: "Production Release Build run ID that uploaded zeroclaw-linux-amd64"
                required: true
                type: string
            environment:
                description: "GitHub deployment environment"
                required: false
                default: production-vps
                type: string

concurrency:
    group: deploy-vps-${{ github.event.inputs.environment || 'production-vps' }}
    cancel-in-progress: false

permissions:
    actions: read
    contents: read

env:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: core.hooksPath
    GIT_CONFIG_VALUE_0: /dev/null

jobs:
    deploy:
        name: Deploy Production Artifact to VPS
        if: >-
            (github.event_name == 'workflow_run' &&
            github.event.workflow_run.conclusion == 'success' &&
            github.event.workflow_run.head_branch == 'main') ||
            github.event_name == 'workflow_dispatch'
        runs-on: [self-hosted, Linux, X64, aws-india, blacksmith-2vcpu-ubuntu-2404, hetzner]
        timeout-minutes: 20
        environment:
            name: ${{ github.event.inputs.environment || 'production-vps' }}
        steps:
            - name: Resolve release artifact run
              id: artifact
              shell: bash
              env:
                  WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
                  DISPATCH_RUN_ID: ${{ github.event.inputs.artifact_run_id }}
                  WORKFLOW_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
              run: |
                  set -euo pipefail
                  run_id="${WORKFLOW_RUN_ID:-${DISPATCH_RUN_ID:-}}"
                  deploy_sha="${WORKFLOW_HEAD_SHA:-${GITHUB_SHA}}"

                  if [ -z "${run_id}" ]; then
                    echo "::error::No artifact run ID was available. For manual runs, provide artifact_run_id from Production Release Build."
                    exit 1
                  fi

                  if [[ ! "${run_id}" =~ ^[0-9]+$ ]]; then
                    echo "::error::artifact_run_id must be a numeric GitHub Actions run ID."
                    exit 1
                  fi

                  {
                    echo "run_id=${run_id}"
                    echo "deploy_sha=${deploy_sha}"
                  } >> "$GITHUB_OUTPUT"

            - name: Download and verify production artifact
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  ARTIFACT_RUN_ID: ${{ steps.artifact.outputs.run_id }}
              run: |
                  set -euo pipefail
                  mkdir -p artifact

                  artifacts_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${ARTIFACT_RUN_ID}/artifacts"
                  artifacts_json="$(curl -fsSL \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    "${artifacts_url}")"

                  artifact_id="$(ARTIFACTS_JSON="${artifacts_json}" python3 - <<'PY'
                  import json
                  import os
                  import sys

                  payload = json.loads(os.environ["ARTIFACTS_JSON"])
                  for artifact in payload.get("artifacts", []):
                      if artifact.get("name") == "zeroclaw-linux-amd64" and not artifact.get("expired", True):
                          print(artifact["id"])
                          sys.exit(0)

                  sys.exit("zeroclaw-linux-amd64 artifact not found or expired")
                  PY
                  )"

                  curl -fsSL \
                    -H "Authorization: Bearer ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github+json" \
                    -H "X-GitHub-Api-Version: 2022-11-28" \
                    -o artifact.zip \
                    "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip"

                  unzip -q artifact.zip -d artifact
                  test -f artifact/zeroclaw
                  test -f artifact/zeroclaw.sha256

                  expected="$(cut -d ' ' -f1 artifact/zeroclaw.sha256)"
                  actual="$(sha256sum artifact/zeroclaw | cut -d ' ' -f1)"
                  if [ "${expected}" != "${actual}" ]; then
                    echo "::error::Artifact checksum mismatch."
                    exit 1
                  fi

                  chmod 0755 artifact/zeroclaw
                  ./artifact/zeroclaw --version

            - name: Configure SSH
              shell: bash
              env:
                  VPS_HOST: ${{ secrets.VPS_HOST }}
                  VPS_USER: ${{ secrets.VPS_USER }}
                  VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT || '22' }}
                  VPS_SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
                  VPS_SSH_KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
              run: |
                  set -euo pipefail
                  missing=0
                  for name in VPS_HOST VPS_USER VPS_PORT VPS_SSH_PRIVATE_KEY VPS_SSH_KNOWN_HOSTS; do
                    if [ -z "${!name:-}" ]; then
                      echo "::error::Required deployment secret or variable is missing: ${name}"
                      missing=1
                    fi
                  done
                  if [ "${missing}" -ne 0 ]; then
                    exit 1
                  fi

                  install -d -m 0700 ~/.ssh
                  printf '%s\n' "${VPS_SSH_PRIVATE_KEY}" > ~/.ssh/zeroclaw_vps
                  chmod 0600 ~/.ssh/zeroclaw_vps
                  printf '%s\n' "${VPS_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
                  chmod 0644 ~/.ssh/known_hosts

                  cat > ~/.ssh/config <<EOF
                  Host zeroclaw-vps
                    HostName ${VPS_HOST}
                    User ${VPS_USER}
                    Port ${VPS_PORT}
                    IdentityFile ~/.ssh/zeroclaw_vps
                    IdentitiesOnly yes
                    StrictHostKeyChecking yes
                    UserKnownHostsFile ~/.ssh/known_hosts
                  EOF
                  chmod 0600 ~/.ssh/config

            - name: Upload release candidate
              shell: bash
              env:
                  DEPLOY_SHA: ${{ steps.artifact.outputs.deploy_sha }}
              run: |
                  set -euo pipefail
                  remote_dir=".zeroclaw/deploy"
                  remote_bin="${remote_dir}/zeroclaw-${DEPLOY_SHA}"

                  ssh zeroclaw-vps "mkdir -p ${remote_dir}"
                  scp artifact/zeroclaw "zeroclaw-vps:${remote_bin}"
                  scp artifact/zeroclaw.sha256 "zeroclaw-vps:${remote_bin}.sha256"
                  ssh zeroclaw-vps "chmod 0755 ${remote_bin} && ${remote_bin} --version"

            - name: Activate release and restart service
              shell: bash
              env:
                  DEPLOY_SHA: ${{ steps.artifact.outputs.deploy_sha }}
              run: |
                  set -euo pipefail
                  ssh zeroclaw-vps "DEPLOY_SHA='${DEPLOY_SHA}' bash -s" <<'REMOTE'
                  set -euo pipefail

                  staged="$HOME/.zeroclaw/deploy/zeroclaw-${DEPLOY_SHA}"
                  test -x "${staged}"

                  sudo install -m 0755 -o root -g root "${staged}" /usr/local/bin/zeroclaw
                  /usr/local/bin/zeroclaw --version

                  if /usr/local/bin/zeroclaw service restart; then
                    /usr/local/bin/zeroclaw service status
                  elif command -v systemctl >/dev/null 2>&1 && systemctl --user list-unit-files zeroclaw.service >/dev/null 2>&1; then
                    systemctl --user daemon-reload
                    systemctl --user restart zeroclaw.service
                    systemctl --user --no-pager --full status zeroclaw.service
                  elif command -v rc-service >/dev/null 2>&1; then
                    sudo rc-service zeroclaw restart
                    sudo rc-service zeroclaw status
                  else
                    echo "::warning::No supported ZeroClaw service manager detected after binary install."
                  fi
                  REMOTE

            - name: Deployment summary
              shell: bash
              env:
                  ARTIFACT_RUN_ID: ${{ steps.artifact.outputs.run_id }}
                  DEPLOY_SHA: ${{ steps.artifact.outputs.deploy_sha }}
              run: |
                  set -euo pipefail
                  {
                    echo "### VPS Deployment"
                    echo "- Artifact run ID: \`${ARTIFACT_RUN_ID}\`"
                    echo "- Deploy SHA: \`${DEPLOY_SHA}\`"
                    echo "- Binary path: \`/usr/local/bin/zeroclaw\`"
                    echo "- Service restart: attempted via \`zeroclaw service restart\`, systemd user service, then OpenRC fallback"
                  } >> "$GITHUB_STEP_SUMMARY"
